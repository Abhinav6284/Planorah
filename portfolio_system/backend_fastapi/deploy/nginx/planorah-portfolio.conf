# ============================================================
# /etc/nginx/sites-available/planorah-portfolio
# Planorah Portfolio — Custom Domain Support
# ============================================================
#
# This file has THREE server blocks:
#
#   1. HTTP redirect for planorah.me (force HTTPS)
#   2. HTTPS for planorah.me (primary vhost)
#   3. HTTP catch-all for custom domains (routes to FastAPI;
#      Certbot will add a matching HTTPS block automatically)
#
# The key insight: Nginx is configured with "default_server" on
# the catch-all block so that ANY domain pointing at this IP
# gets proxied to FastAPI.  FastAPI's CustomDomainMiddleware then
# decides whether to handle it or 404.
# ============================================================


# -------- 1. HTTP → HTTPS redirect for planorah.me ----------
server {
    listen      80;
    listen      [::]:80;
    server_name planorah.me www.planorah.me api.planorah.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# -------- 2. HTTPS — planorah.me (API + main site) ----------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.planorah.me;

    ssl_certificate     /etc/letsencrypt/live/api.planorah.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.planorah.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}


# -------- 3. HTTP catch-all — custom domains --------------------------------
#
# This block accepts connections for ANY domain pointing at this server
# (user custom domains, e.g. abhinavgoyal.dev).
#
# Traffic is sent to Next.js (port 3000) so the portfolio page is rendered
# server-side.  Requests under /v1/ are forwarded to FastAPI (port 8000)
# so the Next.js SSR page can call the portfolio API.
#
# Certbot will automatically add a matching HTTPS block when you run:
#   sudo bash deploy/certbot-custom-domain.sh <domain> <email>
# ============================================================
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;          # matches everything not caught by blocks above

    # ACME challenge (Certbot HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # FastAPI internal API calls from the Next.js SSR layer
    location /v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Everything else → Next.js (renders the portfolio page)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # CRITICAL: forward the original Host header so Next.js middleware
        # can detect the custom domain and the SSR page can query FastAPI
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        client_max_body_size 16M;
    }
}
