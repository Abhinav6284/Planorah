<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planorah — AI Academic Planner</title>
<link rel="stylesheet" href="styles.css?v=3" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#ffffff"/>
    <rect x="60" y="60" width="80" height="80" rx="18" fill="#242424"/>
    <text x="100" y="120" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="600" font-size="52">P</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="src/shared.jsx"></script>
<script type="text/babel" data-presets="react" src="src/marketing.jsx"></script>
<script type="text/babel" data-presets="react" src="src/auth.jsx"></script>
<script type="text/babel" data-presets="react" src="src/app.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

const App = () => {
  const [route, setRouteRaw] = useState(() => localStorage.getItem('planorah.route') || 'home');
  const [inApp, setInAppRaw] = useState(() => localStorage.getItem('planorah.inApp') === 'true');
  const [assignment, setAssignment] = useState('a1');
  const [theme, setTheme] = useState(TWEAK_DEFAULS.theme || 'light');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const setRoute = (r) => { setRouteRaw(r); localStorage.setItem('planorah.route', r); window.scrollTo(0, 0); };
  const setInApp = (v) => { setInAppRaw(v); localStorage.setItem('planorah.inApp', String(v)); };

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // Tweaks integration
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const applyTheme = (v) => {
    setTheme(v);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: v } }, '*');
  };

  // Auto-correct route if inApp/marketing don't match
  useEffect(() => {
    const appRoutes = ['dashboard', 'planner', 'semester', 'courses', 'chat', 'assignment', 'onboarding'];
    const marketingRoutes = ['home', 'features', 'pricing', 'login', 'register'];
    if (inApp && marketingRoutes.includes(route)) setRouteRaw('dashboard');
    if (!inApp && appRoutes.includes(route)) setRouteRaw('home');
  }, []);

  const label = (r) => ({
    home: '01 Home', features: '02 Features', pricing: '03 Pricing',
    login: '04 Login', register: '05 Register',
    onboarding: '06 Onboarding', dashboard: '07 Dashboard',
    planner: '08 Planner', semester: '09 Semester',
    courses: '10 Courses', assignment: '11 Assignment',
    chat: '12 Chat'
  })[r];

  return (
    <div data-screen-label={label(route)}>
      {route !== 'onboarding' && route !== 'login' && route !== 'register' && (
        <TopNav route={route} setRoute={setRoute} inApp={inApp} setInApp={setInApp} />
      )}

      {/* Marketing */}
      {route === 'home'     && <HomePage setRoute={setRoute} setInApp={setInApp} />}
      {route === 'features' && <FeaturesPage setRoute={setRoute} setInApp={setInApp} />}
      {route === 'pricing'  && <PricingPage setRoute={setRoute} setInApp={setInApp} />}

      {/* Auth */}
      {route === 'login'    && <LoginPage setRoute={setRoute} setInApp={setInApp} />}
      {route === 'register' && <RegisterPage setRoute={setRoute} setInApp={setInApp} />}

      {/* App */}
      {route === 'onboarding' && <OnboardingPage setRoute={setRoute} />}
      {route === 'dashboard'  && <DashboardPage setRoute={setRoute} setAssignment={setAssignment} />}
      {route === 'planner'    && <PlannerPage setRoute={setRoute} setAssignment={setAssignment} />}
      {route === 'semester'   && <SemesterPage setRoute={setRoute} />}
      {route === 'courses'    && <CoursesPage setRoute={setRoute} setAssignment={setAssignment} />}
      {route === 'assignment' && <AssignmentDetailPage assignmentId={assignment} setRoute={setRoute} />}
      {route === 'chat'       && <ChatPage setRoute={setRoute} />}

      {!inApp && route !== 'onboarding' && route !== 'login' && route !== 'register' && <Footer setRoute={setRoute} />}

      {tweaksOpen && (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweaks-row">
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
              {theme === 'dark' ? <IconMoon size={13} /> : <IconSun size={13} />}
              {theme === 'dark' ? 'Dark mode' : 'Light mode'}
            </span>
            <div className="toggle" data-on={theme === 'dark'} onClick={() => applyTheme(theme === 'dark' ? 'light' : 'dark')}>
              <div className="toggle-knob" />
            </div>
          </div>
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border-subtle)', fontSize: 11, color: 'var(--fg-muted)' }}>
            Jump to screen
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 8 }}>
            {['home', 'features', 'pricing', 'login', 'register', 'onboarding', 'dashboard', 'planner', 'semester', 'courses', 'assignment', 'chat'].map(r => (
              <span key={r} onClick={() => {
                const appRoutes = ['dashboard', 'planner', 'semester', 'courses', 'chat', 'assignment', 'onboarding'];
                setInApp(appRoutes.includes(r));
                setRoute(r);
              }} style={{
                fontSize: 11,
                padding: '3px 8px',
                borderRadius: 4,
                background: route === r ? 'var(--charcoal)' : 'var(--light-gray)',
                color: route === r ? 'var(--white)' : 'var(--fg-deep)',
                cursor: 'pointer',
                textTransform: 'capitalize'
              }}>{r}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// Scroll reveal: observe any [data-reveal] element and toggle .in.
// Also drives a subtle parallax on [data-parallax] elements.
(function() {
  const revealSelectors = '.reveal, .reveal-fade, .reveal-left, .reveal-right, .reveal-scale, .hero-line';
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
      } else if (e.target.dataset.revealOnce !== 'true' && e.boundingClientRect.top > window.innerHeight) {
        e.target.classList.remove('in');
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

  function wire() {
    document.querySelectorAll(revealSelectors).forEach(el => {
      if (!el.__revealWired) { el.__revealWired = true; io.observe(el); }
    });
  }
  const mo = new MutationObserver(wire);
  mo.observe(document.body, { childList: true, subtree: true });
  wire();

  // Parallax drift on scroll
  let raf = 0;
  function tick() {
    raf = 0;
    const y = window.scrollY;
    document.querySelectorAll('[data-parallax]').forEach(el => {
      const s = parseFloat(el.dataset.parallax) || 0.1;
      el.style.transform = `translate3d(0, ${(-y * s).toFixed(1)}px, 0)`;
    });
  }
  window.addEventListener('scroll', () => {
    if (!raf) raf = requestAnimationFrame(tick);
  }, { passive: true });
})();
</script>
</body>
</html>
